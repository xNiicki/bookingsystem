name: Deploy Laravel Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0' # Specify your PHP version
          extensions: mbstring, xml, curl, zip
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run tests
        run: php artisan test

      - name: Deploy to Hetzner
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > private_key
          chmod 600 private_key
          rsync -avz --delete --exclude='.git*' -e "ssh -i private_key -o StrictHostKeyChecking=no" . $USERNAME@$HOST:/bookingsystem/
          ssh -i private_key -o StrictHostKeyChecking=no $USERNAME@$HOST "cd /bookingsystem && php artisan migrate --force && php artisan optimize && npm run prod"
