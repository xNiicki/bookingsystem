name: Deploy Laravel Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - example
        - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run tests
        run: php artisan test

      - name: Set environment file
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Using ${{ github.event.inputs.environment }} environment"
            cp .env.${{ github.event.inputs.environment }} .env
          else
            echo "Using production environment"
            cp .env.example .env
          fi

      - name: Deploy to Hetzner
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > private_key
          chmod 600 private_key
          rsync -avz --delete --exclude='.git*' -e "ssh -i private_key -o StrictHostKeyChecking=no" . $USERNAME@$HOST:/path/to/your/app/
          ssh -i private_key -o StrictHostKeyChecking=no $USERNAME@$HOST "cd /path/to/your/app && php artisan migrate --force && php artisan optimize"
