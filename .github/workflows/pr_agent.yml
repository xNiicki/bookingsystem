name: Auto Merge Bot
on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
jobs:
  auto-merge-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Auto Merge Bot
        uses: casassg/auto-merge-bot@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
